name: Deploy to Production

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          JOBS_CSV_URL: ${{ secrets.JOBS_CSV_URL }}
          JOBS_CSV_TOKEN: ${{ secrets.JOBS_CSV_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          # 20m (was 10m): the full migration chain re-runs backfill_front_office
          # over the ~28k-row jobs table whenever migrations/ changes, which can
          # brush against the old 10m SSH cap. Give it headroom.
          command_timeout: 20m
          # Forward the scraper-feed secrets into the remote shell so the step
          # below can upsert them into /opt/app/.env (the file load_dotenv reads).
          envs: JOBS_CSV_URL,JOBS_CSV_TOKEN
          # Pull the latest deploy.sh FIRST so this run always uses the newest
          # version (avoids the "deploy.sh updates itself mid-run" race where
          # bash holds the old script in memory after git reset --hard).
          script: |
            set -e
            cd /opt/app
            git fetch origin master
            git reset --hard origin/master
            # Upsert the scraper-feed vars into .env (idempotent; skips if unset).
            if [ -n "${JOBS_CSV_URL:-}" ] && [ -n "${JOBS_CSV_TOKEN:-}" ]; then
              touch .env
              grep -vE '^(JOBS_CSV_URL|JOBS_CSV_TOKEN)=' .env > .env.tmp || true
              printf 'JOBS_CSV_URL=%s\n' "$JOBS_CSV_URL" >> .env.tmp
              printf 'JOBS_CSV_TOKEN=%s\n' "$JOBS_CSV_TOKEN" >> .env.tmp
              mv .env.tmp .env
              chmod 600 .env
              echo "scraper-feed env upserted into /opt/app/.env"
            fi
            # --- Recover from a prior timed-out deploy ---------------------
            # A deploy whose SSH client hit command_timeout can leave run.py /
            # deploy.sh still running on the box, holding the flock and (worse)
            # a SQLite write lock, which wedges every later deploy. Surface what
            # is holding things, then clear any stale migration/deploy process.
            # All migrations are idempotent, so killing a half-run one is safe.
            echo "=== stale deploy procs (pid etime cmd) ==="
            ps -eo pid,etimes,cmd | grep -E 'migrations/run\.py|scripts/deploy\.sh' | grep -v grep || echo "  none"
            echo "=== holders of jobs.db ==="
            fuser -v /opt/app/data/jobs.db 2>&1 || echo "  (fuser found nothing / unavailable)"
            pkill -f 'migrations/run\.py' 2>/dev/null && echo "killed stale run.py" || echo "no stale run.py"
            pkill -f 'scripts/deploy\.sh' 2>/dev/null && echo "killed stale deploy.sh" || echo "no stale deploy.sh"
            sleep 3
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
