name: Deploy to Production

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          JOBS_CSV_URL: ${{ secrets.JOBS_CSV_URL }}
          JOBS_CSV_TOKEN: ${{ secrets.JOBS_CSV_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          # 20m (was 10m): the full migration chain re-runs backfill_front_office
          # over the ~28k-row jobs table whenever migrations/ changes, which can
          # brush against the old 10m SSH cap. Give it headroom.
          command_timeout: 20m
          # Forward the scraper-feed secrets into the remote shell so the step
          # below can upsert them into /opt/app/.env (the file load_dotenv reads).
          envs: JOBS_CSV_URL,JOBS_CSV_TOKEN
          # Pull the latest deploy.sh FIRST so this run always uses the newest
          # version (avoids the "deploy.sh updates itself mid-run" race where
          # bash holds the old script in memory after git reset --hard).
          script: |
            set -e
            cd /opt/app
            git fetch origin master
            git reset --hard origin/master
            # Upsert the scraper-feed vars into .env (idempotent; skips if unset).
            if [ -n "${JOBS_CSV_URL:-}" ] && [ -n "${JOBS_CSV_TOKEN:-}" ]; then
              touch .env
              grep -vE '^(JOBS_CSV_URL|JOBS_CSV_TOKEN)=' .env > .env.tmp || true
              printf 'JOBS_CSV_URL=%s\n' "$JOBS_CSV_URL" >> .env.tmp
              printf 'JOBS_CSV_TOKEN=%s\n' "$JOBS_CSV_TOKEN" >> .env.tmp
              mv .env.tmp .env
              chmod 600 .env
              echo "scraper-feed env upserted into /opt/app/.env"
            fi
            # --- Clear a wedged prior deploy + stuck DB lock -----------------
            # A timed-out migration can stay alive holding the flock while blocked
            # on the SQLite write lock the live app's in-process scheduler holds.
            # (1) Kill any stale migration, matched by argv but comm-checked to
            #     'python' so this never SIGTERMs the deploy's own bash shell
            #     (whose inline argv also contains the pattern text).
            for pid in $(pgrep -f '/opt/app/migrations/run.py' 2>/dev/null || true); do
              case "$(cat /proc/$pid/comm 2>/dev/null || true)" in
                python*) kill -9 "$pid" 2>/dev/null && echo "cleared stale migration pid $pid" || true ;;
              esac
            done
            # (2) Restart the app so its in-process DB write lock is released and
            #     the migration below can actually acquire the database.
            systemctl restart newwhale || true
            echo "restarted app to release DB write lock"
            sleep 5
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
