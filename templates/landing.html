{% extends "layout.html" %}
{% block title %}NewWhale Career Portal{% endblock %}

{% block content %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
  .editorial-canvas {
    --ink: #0F1F3A;
    --ink-soft: rgba(15, 31, 58, 0.6);
    --wash: #D6E0EC;
    --cream: #FAF8F3;
    --rule: rgba(15, 31, 58, 0.16);

    position: relative;
    margin: -1.5rem -15px 0;
    min-height: calc(100vh - 80px);
    background: var(--cream);
    color: var(--ink);
    font-family: 'Instrument Sans', system-ui, sans-serif;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* Subtle paper grain — printed-page feel, not glossy web canvas. */
  .editorial-canvas::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.06  0 0 0 0 0.12  0 0 0 0 0.23  0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.7;
    pointer-events: none;
    z-index: 1;
  }

  .editorial-masthead {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 1.4rem clamp(1.5rem, 5vw, 4rem);
    border-bottom: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .mast-left  { color: var(--ink); font-weight: 600; }
  .mast-right { color: var(--ink-soft); font-weight: 400; }

  .editorial-hero {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1.25fr 1fr;
    align-items: center;
    gap: clamp(2rem, 4vw, 5rem);
    padding: clamp(3rem, 8vw, 6.5rem) clamp(1.5rem, 5vw, 4rem);
  }

  .editorial-text { max-width: 38rem; }
  .editorial-text > * { opacity: 0; transform: translateY(14px); animation: rise 0.8s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; }
  .editorial-text .label   { animation-delay: 0.10s; }
  .editorial-text .display { animation-delay: 0.25s; }
  .editorial-text .rule    { animation-delay: 0.50s; }
  .editorial-text .body    { animation-delay: 0.65s; }
  .editorial-text .signin  { animation-delay: 0.80s; }

  .editorial-text .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 1.75rem;
  }

  .editorial-text .display {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 144;
    font-size: clamp(3.2rem, 7.5vw, 6.2rem);
    line-height: 0.92;
    letter-spacing: -0.025em;
    margin: 0 0 2rem;
    color: var(--ink);
  }
  .editorial-text .display .ital {
    display: block;
    font-style: italic;
    font-weight: 400;
  }
  .editorial-text .display .reg {
    display: block;
    font-weight: 500;
    margin-top: -0.05em;
  }

  .editorial-text .rule {
    width: 56px;
    height: 1px;
    background: var(--ink);
    margin: 0 0 1.75rem;
  }

  .editorial-text .body {
    font-size: 1.05rem;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 28rem;
    margin: 0 0 2.5rem;
  }

  .editorial-text .signin {
    display: inline-flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.95rem 1.6rem;
    background: var(--ink);
    color: var(--cream);
    text-decoration: none;
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    border: 1px solid var(--ink);
    transition: background 0.25s ease, transform 0.25s ease;
  }
  .editorial-text .signin:hover {
    background: #000;
    color: var(--cream);
    transform: translateY(-1px);
  }
  .editorial-text .signin .arrow {
    font-family: 'Fraunces', serif;
    font-style: italic;
    transition: transform 0.25s ease;
  }
  .editorial-text .signin:hover .arrow {
    transform: translateX(3px);
  }

  .editorial-mark {
    position: relative;
    height: 100%;
    min-height: 22rem;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .editorial-mark .whale {
    width: clamp(20rem, 32vw, 34rem);
    aspect-ratio: 696 / 400;
    -webkit-mask-image: url('{{ url_for("static", filename="img/newwhale_mark.png") }}');
            mask-image: url('{{ url_for("static", filename="img/newwhale_mark.png") }}');
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-position: right center;
            mask-position: right center;
    -webkit-mask-size: contain;
            mask-size: contain;
    background: var(--wash);
    opacity: 0;
    animation: rise-slow 1.6s ease-out 0.4s forwards;
  }
  /* A single horizon line: a thin rule sitting at the visual centerline
     where the whale's spine would be. Editorial conceit — the whale
     emerges from the rule like a print mark. */
  .editorial-mark::before {
    content: "";
    position: absolute;
    top: 50%;
    right: 0;
    width: clamp(20rem, 32vw, 34rem);
    height: 1px;
    background: var(--ink);
    opacity: 0.18;
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes rise-slow {
    to { opacity: 1; }
  }

  @media (max-width: 900px) {
    .editorial-hero { grid-template-columns: 1fr; }
    .editorial-mark {
      min-height: 16rem;
      justify-content: center;
    }
    .editorial-mark .whale {
      -webkit-mask-position: center;
              mask-position: center;
      width: min(22rem, 70vw);
    }
    .editorial-mark::before {
      width: min(22rem, 70vw);
      right: 50%;
      transform: translateX(50%);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .editorial-text > *, .editorial-mark .whale {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
    }
  }
</style>

<div class="editorial-canvas">
  <header class="editorial-masthead">
    <span class="mast-left">NewWhale Career</span>
    <span class="mast-right">Student Portal · Access</span>
  </header>

  <section class="editorial-hero">
    <div class="editorial-text">
      <div class="label">Sign In</div>
      <h1 class="display">
        <span class="ital">Portal</span>
        <span class="reg">for Students.</span>
      </h1>
      <div class="rule"></div>
      <p class="body">Sign in with the credentials issued to you by your administrator.</p>
      <a href="{{ url_for('auth.login') }}" class="signin">
        Sign in
        <span class="arrow">→</span>
      </a>
    </div>

    <div class="editorial-mark">
      <div class="whale" aria-hidden="true"></div>
    </div>
  </section>
</div>
{% endblock %}
