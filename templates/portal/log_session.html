{% extends "layout.html" %}
{% block title %}Log a Session - NewWhale{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0"><i class="bi bi-journal-plus"></i> Log a Session</h4>
      <a href="{{ url_for('portal.mentor_sessions') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-clock-history"></i> My session history
      </a>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="POST" action="{{ url_for('portal.log_session') }}" class="row g-3">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="col-md-8">
            <label class="form-label small mb-0">Student</label>
            <select name="student_id" class="form-select form-select-sm" required>
              <option value="" selected disabled>Select a student by ID and name…</option>
              {% for s in students %}
              <option value="{{ s.id }}">#{{ s.portal_code or s.id }} — {{ s.full_name or s.username }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label small mb-0">Length (hours)</label>
            <input type="number" step="0.25" min="0.25" name="hours" class="form-control form-control-sm" placeholder="e.g. 1.5" required>
          </div>
          <div class="col-md-6">
            <label class="form-label small mb-0">Session type</label>
            <select name="session_type" class="form-select form-select-sm" required>
              {% for t in session_types %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label small mb-0">Topic (optional)</label>
            <input type="text" name="topic" class="form-control form-control-sm" maxlength="255">
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit"><i class="bi bi-send"></i> Submit for approval</button>
            <span class="text-muted small ms-2">The student approves and rates it before it counts.</span>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
