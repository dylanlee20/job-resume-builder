{% extends "layout.html" %}
{% block title %}Log a Session - NewWhale{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0"><i class="bi bi-journal-plus"></i> Log a Session</h4>
      <a href="{{ url_for('portal.mentor_sessions') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-clock-history"></i> My session history
      </a>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="POST" action="{{ url_for('portal.log_session') }}" class="row g-3">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

          {% if pick_mentor %}
          <div class="col-12">
            <label class="form-label small mb-1">Log as mentor</label>
            <select name="mentor_id" class="form-select form-select-sm" required>
              <option value="" selected disabled>Choose a mentor…</option>
              {% for m in mentors %}
              <option value="{{ m.id }}">#{{ m.portal_code }} — {{ m.full_name or m.username }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label small mb-1">Student</label>
            <select name="student_id" class="form-select form-select-sm" required>
              <option value="" selected disabled>Choose a student…</option>
              {% for s in students %}
              <option value="{{ s.id }}">#{{ s.portal_code }} — {{ s.full_name or s.username }}</option>
              {% endfor %}
            </select>
          </div>
          {% else %}
          <div class="col-12">
            <label class="form-label small mb-1">Student</label>
            <select name="student_id" class="form-select form-select-sm">
              <option value="" selected>Choose a student…</option>
              {% for s in students %}
              <option value="{{ s.id }}">#{{ s.portal_code }} — {{ s.full_name or s.username }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label small mb-0">New student — User ID</label>
            <input type="text" name="new_student_code" class="form-control form-control-sm"
                   inputmode="numeric" maxlength="5" autocomplete="off">
          </div>
          <div class="col-md-8">
            <label class="form-label small mb-0">New student — name</label>
            <input type="text" name="new_student_name" class="form-control form-control-sm" autocomplete="off">
          </div>
          {% endif %}

          <div class="col-md-4">
            <label class="form-label small mb-0">Session date</label>
            <input type="date" name="session_date" class="form-control form-control-sm"
                   value="{{ today }}" max="{{ today }}">
          </div>
          <div class="col-md-4">
            <label class="form-label small mb-0">Session type</label>
            <select name="session_type" id="sessionType" class="form-select form-select-sm" required>
              {% for t in session_types %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label small mb-0">Length (hours)</label>
            <input type="number" step="0.25" min="0.25" name="hours" id="hoursInput" class="form-control form-control-sm" required>
            <div id="noShowHint" class="form-text text-warning small d-none">No show = 0.5 hrs (auto-set).</div>
          </div>
          <div class="col-12">
            <label class="form-label small mb-0">Topic / notes</label>
            <textarea name="topic" class="form-control" rows="5" maxlength="2000" required></textarea>
          </div>

          <div class="col-12">
            <button class="btn btn-primary" type="submit">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script>
  (function () {
    var type = document.getElementById('sessionType');
    var hours = document.getElementById('hoursInput');
    var hint = document.getElementById('noShowHint');
    if (!type || !hours || !hint) return;
    var prevHours = '';
    function sync() {
      if (type.value === 'No Show') {
        if (!hours.readOnly) prevHours = hours.value;  // remember a real length
        hours.value = '0.5';
        hours.readOnly = true;
        hint.classList.remove('d-none');
      } else if (hours.readOnly) {
        hours.readOnly = false;
        hours.value = prevHours;
        hint.classList.add('d-none');
      }
    }
    type.addEventListener('change', sync);
    sync();
  })();
</script>
{% endblock %}
